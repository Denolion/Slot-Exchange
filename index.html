<!DOCTYPE html>
<html>
<head>
  <title>Slot Exchange</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>

<body>

<div class="container">

  <h2>🏥 Slot Exchange</h2>

  <button onclick="login()">Login with Email</button>
  <p id="user"></p>

  <div class="card">
    <input id="name" placeholder="Name">

    <select id="current">
      <option>Homa Bay</option>
      <option>Kakamega</option>
      <option>Vihiga</option>
    </select>

    <select id="desired">
      <option>Kakamega</option>
      <option>Vihiga</option>
      <option>Homa Bay</option>
    </select>

    <input id="phone" placeholder="Phone 07XXXXXXXX">
    <input id="price" placeholder="Price (optional)">

    <button onclick="addSlot()">Submit</button>
  </div>

  <input id="search" placeholder="Search..." oninput="loadSlots()">

  <div id="list"></div>

</div>

<script type="module" src="app.js"></script>

</body>
      </html>
